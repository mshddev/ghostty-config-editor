name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (macOS)
    # macOS 15 ships Xcode 16 / Swift 6, which this package's swift-tools 6.0
    # manifest and macOS 14 deployment target require. The app's Ghostty-backed
    # tests XCTSkip when no `ghostty` binary is present (as on CI).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
