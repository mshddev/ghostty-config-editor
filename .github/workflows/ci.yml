name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (macOS)
    # macOS 26 (Tahoe) ships the Xcode 26 / macOS 26 SDK. The app progressively
    # adopts macOS 26 SwiftUI refinements (e.g. `sharedBackgroundVisibility`)
    # behind `if #available(macOS 26, *)` runtime guards; those symbols exist only
    # in the macOS 26 SDK, so CI must compile against it even though the package
    # still deploys to macOS 14 (older systems get the guarded fallback). The
    # Ghostty-backed tests XCTSkip when no `ghostty` binary is present (as on CI).
    runs-on: macos-26
    # A clean build + test finishes in ~1.5 min; the headroom absorbs the
    # occasional slow provision on the newer (scarcer) macos-26 runners so a
    # valid run isn't clipped and reported as "cancelled".
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
